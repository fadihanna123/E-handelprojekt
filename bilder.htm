<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>jQuery</title>
	<link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/css/lightbox.min.css' />
	<link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/images/close.png' />
	<link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/images/loading.gif' />
	<link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/images/next.png' />
	<link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/images/prev.png' />
</head>
<body>
	<h1>jQuery</h1>
	<button onclick="myFunction()">Klicka här</button>

	<p id="myimage">
		<a href="Campus.jpg" data-lightbox="campus" data-title="Campus 1, Sundsvall"><img src="Campus.jpg" alt="Campus Sundsvall" style='width: 300px; height: 200px;' /></a>
		<a href="Campus.jpg" data-lightbox="campus" data-title="Campus 2, Sundsvall"><img src="Campus.jpg" alt="Campus Sundsvall" style='width: 300px; height: 200px;' /></a>
		<a href="Campus.jpg" data-lightbox="campus" data-title="Campus 3, Sundsvall"><img src="Campus.jpg" alt="Campus Sundsvall" style='width: 300px; height: 200px;' /></a>
	</p>
	<script
  src="https://code.jquery.com/jquery-3.3.1.min.js"
  integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
  crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/js/lightbox.min.js"></script>
	<script>
		function myFunction()
		{
			$("#myimage").toggle(500);
		}
	</script>
</body>
